<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Artist 1 - Beat Box</title>
  <style>
    body {
      background-color: #333 ;
      width: 100%;
      color: white;
      font-family: 'Poppins', sans-serif;
      margin: 0;
    }

    h1, h2 {
      text-align: center;
      color: #ff0066;
      margin-top: 30px;
    }

    .artist-header {
      text-align: center;
      margin-top: 20px;
    }

    .artist-header img {
      width: 100%;
      height: 180px;
      border-radius: 50%;
      object-fit: cover;
      box-shadow: 0 4px 10px rgba(0,0,0,0.6);
    }

    .albums {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 40px;
      padding: 50px;
    }

    .album {
      background-color: #1a1a1a;
      border-radius: 15px;
      padding: 20px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.6);
      transition: transform 0.3s;
    }

    .album:hover {
      transform: scale(1.03);
    }

    .album img {
      width: 100%;
      height: 200px;
      border-radius: 10px;
      object-fit: cover;
    }

    .album h3 {
      text-align: center;
      color: #ff66a3;
      margin-top: 15px;
    }

    .songs {
      margin-top: 15px;
    }

    .songs li {
      list-style: none;
      margin: 10px 0;
      background: #262626;
      padding: 10px;
      border-radius: 10px;
    }

    audio {
      width: 100%;
      margin-top: 5px;
    }

    footer {
      background-color: #1a1a1a;
      text-align: center;
      padding: 20px;
      color: #ccc;
      font-size: 14px;
      border-top: 1px solid #333;
    }

    footer span {
      color: #ff0066;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <div class="artist-header">
  
    <h1>Artist 1</h1>
    <p>Popular Albums & Songs</p>
  </div>

  <div class="albums">
    <!-- Album 1 -->
    <div class="album">
      <img src="https://i.scdn.co/image/ab6761610000e5eb5ba2d75eb08a2d672f9b69b7" alt="Album 1">
      <h3>Summer Beats</h3>
      <ul class="songs">
        <li>
          1. Sunshine Vibes  
          <audio controls>
            <source src="song1.mp3" type="audio/mpeg">
          </audio>
        </li>
        <li>
          2. Beach Party  
          <audio controls>
            <source src="song2.mp3" type="audio/mpeg">
          </audio>
        </li>
      </ul>
    </div>

    <!-- Album 2 -->
    <div class="album">
      <img src="https://static.iwmbuzz.com/wp-content/uploads/2021/01/arijit-singhs-best-songs-to-listen-while-going-for-a-evening-ride-or-jog-920x518.jpg" alt="Album 2">
      <h3>Night Chill</h3>
      <ul class="songs">
        <li>
          1. Moonlight Drive  
          <audio controls>
            <source src="song3.mp3" type="audio/mpeg">
          </audio>
        </li>
        <li>
          2. Dream Nights  
          <audio controls>
            <source src="song4.mp3" type="audio/mpeg">
          </audio>
        </li>
      </ul>
    </div>

    <!-- Album 3 -->
    <div class="album">
      <img src="https://s.saregama.tech/image/c/m/b/ad/db/719_1624534519.jpg" alt="Album 3">
      <h3>Pop Fusion</h3>
      <ul class="songs">
        <li>
          1. Electric Love  
          <audio controls>
            <source src="song5.mp3" type="audio/mpeg">
          </audio>
        </li>
        <li>
          2. Party Fever  
          <audio controls>
            <source src="song6.mp3" type="audio/mpeg">
          </audio>
        </li>
      </ul>
    </div>
  </div>

  <footer>
    © 2025 <span>BEAT BOX</span> 
  </footer>

</body>
</html>
