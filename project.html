    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 0;
        background-color: #111;
      }
      header {
        background-color: #000;
        color: white;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 15px 30px;
      }

      header img {
        width: 40px;
        border-radius: 50%;
        margin-right: 10px;
      }

      .logo {
        display: flex;
        align-items: center;
        font-size: 20px;
        font-weight: bold;
      }

      nav a {
        color: white;
        text-decoration: none;
        margin: 0 15px;
        font-weight: bold;
      }

      nav a:hover {
        color: #ff6b9a;
      }
      main {
        text-align: center;
        padding: 40px 20px;
        background: url(https://img.freepik.com/free-vector/gradient-music-notes-background_23-2151320190.jpg?semt=ais_hybrid&w=740&q=80);
        background-size: cover;
        background-position: center;
      }

      h2 {
        color: white;
        font-size: 28px;
      }

      .albums, .artists {
        display: flex;
        justify-content: center;
        flex-wrap: wrap;
        gap: 25px;
        margin-top: 20px;
      }
      .album-box {
        width: 150px;
        height: 150px;
        background: white;
        border-radius: 10px;
        overflow: hidden;
        box-shadow: 0 0 10px rgba(255,255,255,0.2);
        text-decoration: none;
        color: black;
        font-weight: bold;
        display: block;
      }

      .album-box img {
        width: 100%;
        height: 150px;
        object-fit: cover;
      }

      .artist-box {
        width: 150px;
        height: 150px;
        background: white;
        border-radius: 50%;
        overflow: hidden;
        box-shadow: 0 0 10px rgba(255,255,255,0.3);
        text-decoration: none;
        color: black;
        font-weight: bold;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
      }

      .artist-box img {
        width: 100%;
        height: 150px;
        object-fit: cover;
      }
        footer {
        background-color: #000;
        color: #ccc;
        text-align: center;
        padding: 12px;
        font-size: 14px;
      }
    </style>
